services:
  lexicon-postgres:
    image: pgvector/pgvector:pg16
    container_name: lexicon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lexicon
      POSTGRES_USER: lexicon
      POSTGRES_PASSWORD: lexicon
    ports:
      - "${LEXICON_POSTGRES_PORT:-5433}:5432"
    volumes:
      - lexicon-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexicon -d lexicon"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lexicon-pgdata:
